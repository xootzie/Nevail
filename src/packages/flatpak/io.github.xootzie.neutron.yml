app-id: io.github.xootzie.NEUTRON_APP_NAME_STRIPPED
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: launch-app

finish-args:
  # X11 + Wayland
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  # GPU acceleration
  - --device=dri
  # Network access (Discord needs this)
  - --share=network
  # Audio
  - --socket=pulseaudio
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # System tray
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  # File picker portals
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.FileChooser
  # Home directory access for file uploads/downloads
  - --filesystem=xdg-download
  # Persistent app data
  - --persist=.NEUTRON_INTERNAL_APP_NAME
  # Env: ensure vendored libs are found
  - --env=LD_LIBRARY_PATH=/app/lib/NEUTRON_INTERNAL_APP_NAME/vendored-libs

modules:
  - name: NEUTRON_INTERNAL_APP_NAME
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/NEUTRON_INTERNAL_APP_NAME
      - cp -r app-files/* /app/lib/NEUTRON_INTERNAL_APP_NAME/
      - cp -r distribution /app/lib/NEUTRON_INTERNAL_APP_NAME/
      - install -Dm755 open-in-default-browser /app/lib/NEUTRON_INTERNAL_APP_NAME/open-in-default-browser
      - cp -rP vendored-libs /app/lib/NEUTRON_INTERNAL_APP_NAME/
      - mkdir -p /app/bin
      - ln -s /app/lib/NEUTRON_INTERNAL_APP_NAME/launch-app /app/bin/launch-app
      - install -Dm644 NEUTRON_INTERNAL_APP_NAME.desktop /app/share/applications/io.github.xootzie.NEUTRON_APP_NAME_STRIPPED.desktop
      - install -Dm644 icon256.png /app/share/icons/hicolor/256x256/apps/io.github.xootzie.NEUTRON_APP_NAME_STRIPPED.png
    sources:
      - type: dir
        path: staging
