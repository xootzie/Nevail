app-id: io.github.xootzie.nevail
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: launch-app

finish-args:
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --share=network
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.FileChooser
  - --filesystem=xdg-download
  - --persist=.NEUTRON_INTERNAL_APP_NAME

modules:
  - name: intltool
    cleanup:
      - "*"
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        mirror-urls:
          - https://mirror-hk.koddos.net/lfs/lfs-packages/12.0/intltool-0.51.0.tar.gz
          - https://gstreamer.freedesktop.org/src/mirror/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd
      - type: patch
        path: intltool-perl5.26-regex-fixes.patch

  - name: libdbusmenu
    buildsystem: autotools
    build-options:
      cflags: "-Wno-error"
    cleanup:
      - "*.la"
      - /include
      - /lib/pkgconfig
      - /libexec
      - /share/doc
      - /share/gtk-doc
    config-opts:
      - --with-gtk=3
      - --disable-dumper
      - --disable-static
      - --disable-tests
      - --disable-gtk-doc
      - --enable-introspection=no
      - --disable-vala
    sources:
      - type: archive
        url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
        mirror-urls:
          - https://ftp.fr.openbsd.org/pub/OpenBSD/distfiles/libdbusmenu-16.04.0.tar.gz
        sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a
      - type: patch
        path: 0001-Fix-HAVE_VALGRIND-AM_CONDITIONAL.patch

  - name: ayatana-ido
    buildsystem: cmake-ninja
    cleanup:
      - /include
      - /lib/pkgconfig
    config-opts:
      - -DENABLE_INTROSPECTION=OFF
    sources:
      - type: git
        url: https://github.com/AyatanaIndicators/ayatana-ido.git
        tag: "0.10.4"
        commit: f968079b09e2310fefc3fc307359025f1c74b3eb
      - type: patch
        path: 0001-Make-introspection-configurable.patch

  - name: libayatana-indicator
    buildsystem: cmake-ninja
    build-options:
      env:
        PKG_CONFIG_PATH: /app/lib64/pkgconfig:/app/lib/pkgconfig
    cleanup:
      - /include
      - /lib/pkgconfig
      - /libexec
      - /share
    sources:
      - type: git
        url: https://github.com/AyatanaIndicators/libayatana-indicator.git
        tag: "0.9.4"
        commit: 611bb384b73fa6311777ba4c41381a06f5b99dad

  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    build-options:
      env:
        PKG_CONFIG_PATH: /app/lib64/pkgconfig:/app/lib/pkgconfig
    cleanup:
      - /include
      - /lib/pkgconfig
    config-opts:
      - -DENABLE_BINDINGS_MONO=NO
      - -DENABLE_BINDINGS_VALA=NO
      - -DENABLE_GTKDOC=NO
    sources:
      - type: git
        url: https://github.com/AyatanaIndicators/libayatana-appindicator.git
        tag: "0.5.94"
        commit: 31e8bb083b307e1cc96af4874a94707727bd1e79

  - name: NEUTRON_INTERNAL_APP_NAME
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/NEUTRON_INTERNAL_APP_NAME
      - cp -r app-files/* /app/lib/NEUTRON_INTERNAL_APP_NAME/
      - cp -r distribution /app/lib/NEUTRON_INTERNAL_APP_NAME/
      - install -Dm755 open-in-default-browser /app/lib/NEUTRON_INTERNAL_APP_NAME/open-in-default-browser
      - mkdir -p /app/bin
      - ln -s /app/lib/NEUTRON_INTERNAL_APP_NAME/launch-app /app/bin/launch-app
      - install -Dm644 NEUTRON_INTERNAL_APP_NAME.desktop /app/share/applications/io.github.xootzie.nevail.desktop
      - install -Dm644 icon256.png /app/share/icons/hicolor/256x256/apps/io.github.xootzie.nevail.png
    sources:
      - type: dir
        path: staging
