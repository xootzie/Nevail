name: Nevail Build

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            toolchain-name: x86_64-unknown-linux-gnu
            platforms: linux,deb,appimage,linux-tarball,flatpak
            artifact-names:
              [
                "nevail-linux-x86_64",
                "nevail-deb-x86_64",
                "nevail-appimage-x86_64",
                "nevail-flatpak-x86_64",
              ]
            artifact-paths:
              [
                "build/nevail-linux-x86_64-tarball.tar.bz2",
                "build/nevail-x86_64-*.deb",
                "build/Nevail-x86_64.AppImage",
                "build/nevail-x86_64.flatpak",
              ]

          - name: linux-aarch64
            toolchain-name: aarch64-unknown-linux-gnu
            platforms: linux-aarch64,deb-aarch64,appimage-aarch64
            artifact-names:
              [
                "nevail-linux-aarch64",
                "nevail-deb-aarch64",
                "nevail-appimage-aarch64",
              ]
            artifact-paths:
              [
                "build/nevail-linux-aarch64.tar.bz2",
                "build/nevail-aarch64-*.deb",
                "build/Nevail-aarch64.AppImage",
              ]

          - name: darwin-x86_64
            toolchain-name: x86_64-apple-darwin
            platforms: mac-intel
            artifact-names: ["nevail-darwin-x86_64", "", ""]
            artifact-paths: ["build/nevail-darwin-x86_64.dmg", "", ""]

          - name: darwin-aarch64
            toolchain-name: aarch64-apple-darwin
            platforms: mac-arm
            artifact-names: ["nevail-darwin-aarch64", "", ""]
            artifact-paths: ["build/nevail-darwin-aarch64.dmg", "", ""]

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Restore sccache
        id: sccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ matrix.name }}

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Build
        run: |
          # Clear even more disk space
          sudo apt-get remove -y '^aspnetcore-.*'
          sudo apt-get remove -y '^dotnet-.*' --fix-missing
          sudo apt-get remove -y 'php.*' --fix-missing
          sudo apt-get remove -y '^mongodb-.*' --fix-missing
          sudo apt-get remove -y '^mysql-.*' --fix-missing
          sudo apt-get remove -y azure-cli google-chrome-stable firefox powershell --fix-missing
          sudo apt-get remove -y google-cloud-sdk --fix-missing
          sudo apt-get remove -y google-cloud-cli
          sudo apt-get autoremove -y

          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /opt/hostedtoolcache/node

          # Create extra swap
          sudo dd if=/dev/zero of=/swapfile_ bs=1024 count=10485760
          sudo mkswap /swapfile_
          sudo chmod 600 /swapfile_
          sudo swapon /swapfile_

          # Patch openssl.cnf for osxcross-macports to enable ripemd160
          sudo bash -c 'sed -i "s/^#openssl_conf = openssl_init/openssl_conf = openssl_init/g" /etc/ssl/openssl.cnf'
          sudo bash -c 'sed -i "s/^\[provider_sect\]/\[provider_sect\]\nlegacy = legacy_sect/g" /etc/ssl/openssl.cnf'
          sudo bash -c 'sed -i "s/^# activate = 1/activate = 1/g" /etc/ssl/openssl.cnf'
          sudo bash -c 'printf "\n[legacy_sect]\nactivate = 1\n" >> /etc/ssl/openssl.cnf'

          # Install deps
          rustup target add ${{ matrix.toolchain-name }}

          sudo apt install alsa pkg-config libssl-dev debhelper libappindicator3-1 libgtk-3-dev libdbusmenu-gtk3-dev

          if [ "${{ matrix.name }}" = "linux-aarch64" ]; then
            sudo apt install gcc-aarch64-linux-gnu
          fi

          if [ "${{ matrix.name }}" = "linux-aarch64" ] || [ "${{ matrix.name }}" = "linux-x86_64" ]; then
            wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            sudo ln -s $PWD/appimagetool-x86_64.AppImage /usr/bin/appimagetool || true
          fi

          if [ "${{ matrix.name }}" = "linux-x86_64" ]; then
            sudo apt install flatpak flatpak-builder
            sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
            sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
          fi

          sudo apt-get clean

          unset CC CXX

          printf "\n\noverride_dh_strip:\n\t#nop" >> src/packages/debian/rules

          pip install -r requirements.txt

          if [ "${{ matrix.name }}" = "linux-x86_64" ]; then
            cp /usr/lib/x86_64-linux-gnu/libdbusmenu-gtk3.so.4* src/launch-app/extern/libappindicator3/x86_64-linux-gnu/ || true
          fi

          python configurator.py --config-file=config.json -p ${{ matrix.platforms }} -b

          # Remove swapfile
          sudo swapoff /swapfile_ || true
          sudo rm -f /swapfile_ || true

      - name: Upload sccache
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ matrix.name }}

      - name: Upload artifact 1
        if: ${{ matrix['artifact-paths'][0] != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix['artifact-names'][0] }}
          path: ${{ matrix['artifact-paths'][0] }}

      - name: Upload artifact 2
        if: ${{ matrix['artifact-paths'][1] != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix['artifact-names'][1] }}
          path: ${{ matrix['artifact-paths'][1] }}

      - name: Upload artifact 3
        if: ${{ matrix['artifact-paths'][2] != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix['artifact-names'][2] }}
          path: ${{ matrix['artifact-paths'][2] }}

      - name: Upload artifact 4
        if: ${{ matrix['artifact-paths'][3] != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix['artifact-names'][3] }}
          path: ${{ matrix['artifact-paths'][3] }}
